name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v)"
        required: true
        default: "0.0.0"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: |
          xcodebuild test \
            -project eml-viewer.xcodeproj \
            -scheme eml-viewer \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build:
    name: Build & Package
    needs: test
    runs-on: macos-15
    outputs:
      version: ${{ steps.vars.outputs.version }}
      sha256: ${{ steps.shasum.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build release
        run: ./scripts/build-release.sh "${{ steps.vars.outputs.version }}"

      - name: Capture SHA-256
        id: shasum
        run: |
          SHA=$(awk '{print $1}' "dist/eml-viewer-${{ steps.vars.outputs.version }}.zip.sha256")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eml-viewer-${{ steps.vars.outputs.version }}
          path: |
            dist/eml-viewer-${{ steps.vars.outputs.version }}.zip
            dist/eml-viewer-${{ steps.vars.outputs.version }}.zip.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: eml-viewer-${{ needs.build.outputs.version }}
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EML Viewer ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Automated release built from ${{ github.sha }}.

            **SHA-256:** `${{ needs.build.outputs.sha256 }}`

            Install via Homebrew (after updating the cask `sha256`):

            ```sh
            brew install --cask longstone/tap/eml-viewer
            ```
          files: |
            dist/eml-viewer-${{ needs.build.outputs.version }}.zip
            dist/eml-viewer-${{ needs.build.outputs.version }}.zip.sha256

  bump-cask:
    name: Open PR to homebrew-tap
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: longstone/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p tap/Casks
          cat > tap/Casks/eml-viewer.rb <<RUBY
          cask "eml-viewer" do
            version "${VERSION}"
            sha256  "${SHA256}"

            url "https://github.com/longstone/eml-viewer-macos/releases/download/v#{version}/eml-viewer-#{version}.zip"
            name "EML Viewer"
            desc "Native macOS viewer for .eml and .msg email files"
            homepage "https://github.com/longstone/eml-viewer-macos"

            app "eml-viewer.app"

            zap trash: [
              "~/Library/Preferences/com.longstone.eml-viewer.plist",
              "~/Library/Saved Application State/com.longstone.eml-viewer.savedState",
            ]
          end
          RUBY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: eml-viewer-${{ needs.build.outputs.version }}
          base: main
          commit-message: "eml-viewer ${{ needs.build.outputs.version }}"
          title: "eml-viewer ${{ needs.build.outputs.version }}"
          body: |
            Automated cask bump triggered by `${{ github.ref_name }}`.

            - Release: https://github.com/longstone/eml-viewer-macos/releases/tag/${{ github.ref_name }}
            - **sha256:** `${{ needs.build.outputs.sha256 }}`
          delete-branch: true
